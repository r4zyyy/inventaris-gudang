<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Barang — Inventaris Gudang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebarPetugas(${activeMenu}, null)}"></div>

    <main class="main">
        <div class="page-head">
            <div>
                <div class="eyebrow">Master Data</div>
                <h1>Data Barang</h1>
                <div class="desc">Lihat daftar barang, stok saat ini, minimum stok, dan status stok.</div>
            </div>
        </div>

        <div class="dev-note">
            Mode tampilan: Petugas Gudang — hanya melihat data, tidak dapat menambah, mengedit, atau menghapus barang.
        </div>

        <div class="card">
            <div class="card-head">
                <h3>Daftar Barang (<span th:text="${barangList.size()}">0</span>)</h3>
                <div class="filter-bar">
                    <input type="text" placeholder="Cari nama barang...">
                    <select>
                        <option>Semua Kategori</option>
                        <option>Elektrikal</option>
                        <option>Plumbing</option>
                        <option>Material</option>
                        <option>K3</option>
                        <option>Hardware</option>
                    </select>
                    <select>
                        <option>Semua Status</option>
                        <option>Normal</option>
                        <option>Menipis</option>
                    </select>
                </div>
            </div>
            <div class="card-body">
                <table>
                    <thead>
                    <tr>
                        <th>Kode</th>
                        <th>Nama Barang</th>
                        <th>Kategori</th>
                        <th>Stok Saat Ini</th>
                        <th>Minimum Stok</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="b : ${barangList}">
                        <td class="mono" th:text="${b.kode}"></td>
                        <td th:text="${b.nama}"></td>
                        <td th:text="${b.kategori}"></td>
                        <td th:text="${b.stokSaatIni} + ' ' + ${b.satuan}"></td>
                        <td th:text="${b.minimumStok} + ' ' + ${b.satuan}"></td>
                        <td>
                            <span class="badge normal" th:if="${b.statusStok == 'Normal'}">Normal</span>
                            <span class="badge menipis" th:if="${b.statusStok == 'Menipis'}">Menipis</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
</body>
</html>
