<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Transaksi — Inventaris Gudang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar(${activeMenu}, ${activeSubMenu})}"></div>

    <main class="main">
        <div class="page-head">
            <div>
                <div class="eyebrow">Transaksi</div>
                <h1>Riwayat Transaksi</h1>
                <div class="desc">Seluruh riwayat transaksi barang masuk dan barang keluar yang tercatat dalam sistem.</div>
            </div>
        </div>

        <div class="tabs">
            <a th:href="@{/admin/transaksi/barang-masuk}" class="tab">Barang Masuk</a>
            <a th:href="@{/admin/transaksi/barang-keluar}" class="tab">Barang Keluar</a>
            <a th:href="@{/admin/transaksi/riwayat}" class="tab active">Riwayat Transaksi</a>
        </div>

        <div class="card" style="margin-top:0; border-top:none;">
            <div class="card-head">
                <h3>Semua Transaksi (<span th:text="${transaksiList.size()}">0</span>)</h3>
                <div class="filter-bar">
                    <select>
                        <option>Semua Tipe</option>
                        <option>Masuk</option>
                        <option>Keluar</option>
                    </select>
                    <input type="date" value="2026-06-01">
                    <span style="color:#a99c87; font-size:0.85rem;">s/d</span>
                    <input type="date" value="2026-06-14">
                </div>
            </div>
            <div class="card-body">
                <table>
                    <thead>
                    <tr>
                        <th>ID Transaksi</th>
                        <th>Tanggal</th>
                        <th>Tipe</th>
                        <th>Kode Barang</th>
                        <th>Nama Barang</th>
                        <th>Jumlah</th>
                        <th>Keterangan</th>
                        <th>Petugas</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="t : ${transaksiList}">
                        <td class="mono" th:text="${t.id}"></td>
                        <td class="mono" th:text="${t.tanggal}"></td>
                        <td>
                            <span class="badge masuk" th:if="${t.tipe == 'Masuk'}">Masuk</span>
                            <span class="badge keluar" th:if="${t.tipe == 'Keluar'}">Keluar</span>
                        </td>
                        <td class="mono" th:text="${t.kodeBarang}"></td>
                        <td th:text="${t.namaBarang}"></td>
                        <td th:text="${t.jumlah}"></td>
                        <td th:text="${t.keterangan}"></td>
                        <td th:text="${t.petugas}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
</body>
</html>
