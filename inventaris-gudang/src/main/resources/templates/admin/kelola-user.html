<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola User — Inventaris Gudang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar(${activeMenu}, null)}"></div>

    <main class="main">
        <div class="page-head">
            <div>
                <div class="eyebrow">Khusus Admin</div>
                <h1>Kelola User</h1>
                <div class="desc">Kelola akun pengguna sistem: tambah, edit, dan hapus user.</div>
            </div>
            <button class="btn solid" onclick="document.getElementById('formTambahUser').showModal()">+ Tambah User</button>
        </div>

        <div class="card">
            <div class="card-head">
                <h3>Daftar User (<span th:text="${userList.size()}">0</span>)</h3>
            </div>
            <div class="card-body">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nama</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${userList}">
                        <td class="mono" th:text="${u.id}"></td>
                        <td th:text="${u.nama}"></td>
                        <td class="mono" th:text="${u.username}"></td>
                        <td>
                            <span class="badge role-admin" th:if="${u.role == 'Admin'}">Admin</span>
                            <span class="badge role-petugas" th:if="${u.role == 'Petugas Gudang'}">Petugas Gudang</span>
                        </td>
                        <td>
                            <span class="badge aktif" th:if="${u.status == 'Aktif'}">Aktif</span>
                            <span class="badge nonaktif" th:if="${u.status == 'Nonaktif'}">Nonaktif</span>
                        </td>
                        <td class="actions-cell">
                            <button class="btn small ghost" th:onclick="|document.getElementById('editUser-${u.id}').showModal()|">Edit</button>
                            <button class="btn small ghost" onclick="alert('Konfirmasi hapus user (frontend only).')">Hapus</button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Modal Tambah User -->
        <dialog id="formTambahUser" style="border:1px solid var(--line); padding:0; width:520px; max-width:90vw;">
            <div class="card" style="margin:0; box-shadow:none;">
                <div class="card-head">
                    <h3>Tambah User Baru</h3>
                </div>
                <div class="card-body" style="padding-top:18px;">
                    <form>
                        <div class="form-grid">
                            <div class="form-group full">
                                <label>Nama Lengkap</label>
                                <input type="text" placeholder="Nama lengkap">
                            </div>
                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" placeholder="username">
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" placeholder="Password">
                            </div>
                            <div class="form-group">
                                <label>Role</label>
                                <select>
                                    <option>Admin</option>
                                    <option>Petugas Gudang</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Status</label>
                                <select>
                                    <option>Aktif</option>
                                    <option>Nonaktif</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn solid" onclick="document.getElementById('formTambahUser').close()">Simpan User</button>
                            <button type="button" class="btn ghost" onclick="document.getElementById('formTambahUser').close()">Batal</button>
                        </div>
                    </form>
                </div>
            </div>
        </dialog>

        <!-- Modal Edit User (per item) -->
        <dialog th:each="u : ${userList}" th:id="${'editUser-' + u.id}" style="border:1px solid var(--line); padding:0; width:520px; max-width:90vw;">
            <div class="card" style="margin:0; box-shadow:none;">
                <div class="card-head">
                    <h3>Edit User — <span th:text="${u.username}"></span></h3>
                </div>
                <div class="card-body" style="padding-top:18px;">
                    <form>
                        <div class="form-grid">
                            <div class="form-group full">
                                <label>Nama Lengkap</label>
                                <input type="text" th:value="${u.nama}">
                            </div>
                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" th:value="${u.username}">
                            </div>
                            <div class="form-group">
                                <label>Password Baru</label>
                                <input type="password" placeholder="Kosongkan jika tidak diubah">
                            </div>
                            <div class="form-group">
                                <label>Role</label>
                                <select>
                                    <option th:selected="${u.role == 'Admin'}">Admin</option>
                                    <option th:selected="${u.role == 'Petugas Gudang'}">Petugas Gudang</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Status</label>
                                <select>
                                    <option th:selected="${u.status == 'Aktif'}">Aktif</option>
                                    <option th:selected="${u.status == 'Nonaktif'}">Nonaktif</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn solid" th:onclick="|document.getElementById('editUser-${u.id}').close()|">Simpan Perubahan</button>
                            <button type="button" class="btn ghost" th:onclick="|document.getElementById('editUser-${u.id}').close()|">Batal</button>
                        </div>
                    </form>
                </div>
            </div>
        </dialog>
    </main>
</div>
</body>
</html>
